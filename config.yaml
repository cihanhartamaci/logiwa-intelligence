# General Configuration
app_name: "Logiwa Integration Intelligence"
log_level: "INFO"

# LLM Configuration (Choose 'openai' or 'gemini')
llm_provider: "gemini"
llm_model: "gemini-flash-latest"
# Pollinations.ai fallback is for local dev only; keep false in CI/production
allow_pollinations_fallback: false

# Notification Configuration
notifications:
  slack:
    enabled: true
    webhook_url_env: "SLACK_WEBHOOK_URL" # Set this in .env
  email:
    enabled: true
    smtp_server: "smtp.gmail.com"
    smtp_port: 587
    sender_email_env: "SMTP_EMAIL" # Set this in .env
    sender_password_env: "SMTP_PASSWORD" # Set this in .env
    recipients:
      - "integration-team@logiwa.com"
      - "cihan.hartamaci@logiwa.com"

# Monitored sources live in sources.yaml (single source of truth)
# Internal Reporter Configuration
reporter:
  output_dir: "reports"
