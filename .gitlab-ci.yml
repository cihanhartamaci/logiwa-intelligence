stages:
  - test
  - deploy
  - monitor

test:
  stage: test
  image: python:3.10
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - pip install --quiet -r requirements.txt -r requirements-dev.txt
    - python -m pytest tests/ -q

# Dashboard → GitLab Pages (replaces deploy_dashboard.yml)
pages:
  stage: deploy
  image: node:20
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"
    - if: $CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "web" && $INTELLIGENCE_CYCLE != "true"
  script:
    - apt-get update -qq && apt-get install -y -qq python3 python3-yaml
    - python3 scripts/export_default_sources.py
    - cd dashboard
    - npm ci
    - npm run build
    - mkdir -p ../public
    - cp -r dist/* ../public/
  artifacts:
    paths:
      - public

# Daily monitoring agent (replaces monitor_intelligence.yml)
monitor:
  stage: monitor
  image: python:3.10
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "api"
    - if: $CI_PIPELINE_SOURCE == "trigger"
    - if: $CI_PIPELINE_SOURCE == "web" && $INTELLIGENCE_CYCLE == "true"
  script:
    - pip install --quiet -r requirements.txt
    - python monitor_agent.py
